<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photobooth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=Satisfy&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1612;
  --surface:#221e18;
  --surface2:#2a2420;
  --cream:#f5f0e8;
  --gold:#c9a84c;
  --gold2:#e8c96a;
  --red:#c0392b;
  --border:#3a3028;
  --text:#e8ddd0;
  --muted:#8a7a6a;
}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem 4rem}

/* subtle grain texture */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4}

.app{max-width:960px;margin:0 auto;position:relative;z-index:1}

/* HEADER */
.header{text-align:center;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
.header-eyebrow{font-size:0.6rem;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);margin-bottom:0.5rem}
.header h1{font-family:'Playfair Display',serif;font-size:2.8rem;letter-spacing:0.05em;color:var(--cream);font-weight:700;line-height:1}
.header h1 span{color:var(--gold);font-style:italic}
.header-sub{font-size:0.62rem;color:var(--muted);letter-spacing:0.25em;text-transform:uppercase;margin-top:0.5rem}

.main{display:grid;grid-template-columns:1fr 300px;gap:1.75rem;align-items:start}

/* VIEWFINDER */
.viewfinder{position:relative;background:#0a0806;border:1px solid var(--border);border-radius:6px;overflow:hidden;aspect-ratio:4/3;box-shadow:0 20px 60px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.04)}
.viewfinder video{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1)}
.corner{position:absolute;width:22px;height:22px;border-color:var(--gold);border-style:solid;opacity:0.6;z-index:2;pointer-events:none}
.corner.tl{top:10px;left:10px;border-width:2px 0 0 2px}
.corner.tr{top:10px;right:10px;border-width:2px 2px 0 0}
.corner.bl{bottom:10px;left:10px;border-width:0 0 2px 2px}
.corner.br{bottom:10px;right:10px;border-width:0 2px 2px 0}
.flash-overlay{position:absolute;inset:0;background:white;opacity:0;pointer-events:none;z-index:10}
.countdown-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:5;pointer-events:none;font-family:'Playfair Display',serif;font-size:8rem;color:white;text-shadow:0 0 40px rgba(0,0,0,0.9),0 2px 0 rgba(0,0,0,0.5);opacity:0;transform:scale(1.5);transition:opacity 0.2s,transform 0.2s}
.countdown-num.show{opacity:1;transform:scale(1)}
.rec-badge{position:absolute;bottom:12px;left:0;right:0;text-align:center;z-index:3;pointer-events:none;display:none}
.rec-inner{display:inline-flex;align-items:center;gap:6px;background:rgba(0,0,0,0.7);color:white;font-size:0.6rem;letter-spacing:0.15em;padding:5px 12px;border-radius:20px;backdrop-filter:blur(4px)}
.rec-dot{width:7px;height:7px;border-radius:50%;background:#ff3b30;animation:pulse 0.8s infinite}

/* CAMERA OVERLAY */
.cam-overlay{position:absolute;inset:0;background:rgba(10,8,6,0.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.25rem;z-index:30;text-align:center;padding:2rem}
.cam-icon{font-size:2.5rem;opacity:0.3;margin-bottom:0.25rem}
.cam-overlay h2{font-family:'Playfair Display',serif;color:var(--cream);font-size:1.5rem;font-weight:400;font-style:italic}
.cam-overlay p{font-size:0.65rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;line-height:2;max-width:220px}
.cam-err{color:#ff6b6b;font-size:0.65rem;max-width:240px;line-height:1.8;margin-top:0.25rem}
.btn-cam-open{font-family:'DM Mono',monospace;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;border:1px solid var(--gold);border-radius:4px;padding:0.7rem 1.6rem;background:transparent;color:var(--gold);transition:all 0.2s}
.btn-cam-open:hover{background:var(--gold);color:#1a1612}

/* DOTS */
.dots{display:flex;gap:8px;justify-content:center;padding:0.5rem 0}
.dot{width:8px;height:8px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);transition:all 0.25s}
.dot.filled{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(201,168,76,0.4)}
.dot.active{background:#ff3b30;border-color:#ff3b30;animation:pulse 0.8s infinite}

@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:0.7}}

/* BUTTONS */
.controls{display:flex;gap:0.6rem}
.btn{font-family:'DM Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);border-radius:4px;padding:0.65rem 1rem;transition:all 0.2s;background:var(--surface);color:var(--text)}
.btn:hover{background:var(--surface2);border-color:rgba(255,255,255,0.15)}
.btn:active{transform:scale(0.98)}
.btn:disabled{opacity:0.3;cursor:not-allowed;transform:none}
.btn-primary{background:var(--gold);color:#1a1612;border-color:var(--gold);flex:1;padding:0.75rem;font-size:0.75rem;font-weight:500}
.btn-primary:hover{background:var(--gold2);border-color:var(--gold2)}
.btn-green{background:#30d158;color:#0a1a0a;border-color:#30d158;flex:1;padding:0.75rem;font-size:0.75rem}
.btn-green:hover{background:#34e35e;border-color:#34e35e}
.btn-red{background:#ff3b30;color:white;border-color:#ff3b30}
.btn-red:hover{background:#ff5146}
.btn-share{background:#0a84ff;color:white;border-color:#0a84ff}
.btn-share:hover{background:#409cff}
.btn-save{background:#30d158;color:#0a1a0a;border-color:#30d158}
.btn-save:hover{background:#34e35e}
.export-row{display:none;gap:0.5rem;flex-wrap:wrap}

/* PANELS */
.panel{border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--surface);box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.panel-header{background:var(--surface2);border-bottom:1px solid var(--border);font-size:0.58rem;letter-spacing:0.25em;text-transform:uppercase;padding:0.45rem 1rem;color:var(--muted)}
.panel-body{padding:0.85rem}
.setting-row{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem}
.setting-row:last-child{margin-bottom:0}
.setting-row label{font-size:0.62rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;flex:1}
.setting-row select{font-family:'DM Mono',monospace;font-size:0.65rem;border:1px solid var(--border);border-radius:3px;padding:0.28rem 0.5rem;background:var(--bg);color:var(--text);cursor:pointer;outline:none}
.setting-row select:focus{border-color:var(--gold)}

/* FORMAT GRID */
.format-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.4rem}
.format-btn{font-family:'DM Mono',monospace;font-size:0.65rem;cursor:pointer;border:1px solid var(--border);border-radius:4px;padding:0.5rem 0.3rem;background:var(--bg);color:var(--muted);transition:all 0.15s;text-align:center}
.format-btn:hover{border-color:rgba(255,255,255,0.2);color:var(--text)}
.format-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.08)}
.format-icon{display:flex;flex-direction:column;gap:2px;align-items:center;margin-bottom:4px}
.frow{display:flex;gap:2px}
.fcell{background:var(--gold);border-radius:1px;opacity:0.7}
.format-btn.active .fcell{opacity:1}
.status-bar{font-size:0.58rem;color:var(--muted);letter-spacing:0.1em;text-align:center;padding:0.3rem;border-top:1px solid var(--border);margin-top:0.35rem}

/* ═══ FRAME BUTTONS ═══ */
.frame-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem}
.frame-btn{cursor:pointer;border:1.5px solid var(--border);border-radius:6px;padding:0;background:var(--bg);transition:all 0.2s;text-align:center;overflow:hidden;position:relative}
.frame-btn:hover{border-color:rgba(255,255,255,0.2);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.frame-btn.active{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 4px 16px rgba(201,168,76,0.2)}
.frame-preview{width:100%;height:58px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.frame-label{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;padding:0.3rem;border-top:1px solid var(--border);background:var(--surface)}
.frame-btn.active .frame-label{color:var(--gold)}

/* preview mini cells */
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;width:38px;height:28px}
.mini-cell{border-radius:1px}

/* frame decorations in preview */
.fp-classic{background:linear-gradient(135deg,#2a2218,#1e1a12)}
.fp-white{background:linear-gradient(135deg,#2a2a2a,#1e1e1e)}
.fp-bday{background:linear-gradient(135deg,#2a1230,#1a0820)}
.fp-love{background:linear-gradient(135deg,#2a1218,#1a080e)}
.fp-spring{background:linear-gradient(135deg,#0e2218,#081a10)}
.fp-galaxy{background:linear-gradient(135deg,#060820,#100818)}

/* Floating decorations */
.deco{position:absolute;pointer-events:none;font-size:10px;opacity:0.7;line-height:1}

/* FILM STRIP */
.film-strip{display:flex;flex-direction:column;gap:0.4rem}
.film-thumb{position:relative;background:#0a0806;border:1px solid var(--border);border-radius:3px;overflow:hidden;aspect-ratio:4/3}
.film-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.film-num{position:absolute;top:4px;left:6px;font-size:0.55rem;color:var(--gold);font-family:'DM Mono',monospace;z-index:1;background:rgba(0,0,0,0.5);padding:1px 4px;border-radius:2px}
.film-del{position:absolute;top:4px;right:4px;background:rgba(255,59,48,0.85);color:white;border:none;border-radius:2px;font-size:0.55rem;cursor:pointer;padding:2px 5px;display:none;z-index:1}
.film-thumb:hover .film-del{display:block}
.empty-slot{background:var(--bg);display:flex;align-items:center;justify-content:center;aspect-ratio:4/3;border:1px dashed var(--border);border-radius:3px}
.empty-slot span{font-size:0.55rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase}
#export-canvas{display:none}

@media(max-width:680px){.main{grid-template-columns:1fr}.header h1{font-size:2rem}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-eyebrow">&#10022; Studio &nbsp;&#10022;</div>
    <h1>Photo<span>booth</span></h1>
    <div class="header-sub">Cek &mdash; Sec &mdash; Kaydet</div>
  </div>

  <div class="main">
    <div style="display:flex;flex-direction:column;gap:0.85rem">
      <div class="viewfinder" id="viewfinder">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="flash-overlay" id="flash"></div>
        <div class="countdown-num" id="cdn">3</div>
        <div class="rec-badge" id="recbadge"><div class="rec-inner"><div class="rec-dot"></div>CEKIYOR</div></div>
        <video id="video" autoplay playsinline muted></video>
        <div class="cam-overlay" id="cam-overlay">
          <div class="cam-icon">&#9676;</div>
          <h2>Kamera Erisimi</h2>
          <p>Fotograf cekebilmek icin kameraniza erisim gerekiyor</p>
          <button class="btn-cam-open" onclick="requestCamera()">&#9654; &nbsp;Kamerayi Ac</button>
          <div class="cam-err" id="cam-err"></div>
        </div>
      </div>

      <div class="dots" id="dots"></div>

      <div class="controls">
        <button class="btn btn-green" id="btn-start" onclick="startSession()" disabled>&#9654; &nbsp;Oturumu Baslat</button>
        <button class="btn btn-red" id="btn-reset" onclick="resetSession()" style="display:none">&#8635; Sifirla</button>
      </div>

      <div class="export-row" id="export-row">
        <button class="btn btn-primary" onclick="doExport('download')">&#8595; Indir</button>
        <button class="btn btn-share" id="btn-share" onclick="doShare()" style="display:none">&#8679; Paylas</button>
        <button class="btn btn-save" id="btn-save" onclick="doSave()" style="display:none">&#9650; Galeriye</button>
        <button class="btn" onclick="doExport('preview')">&#9634; Onizle</button>
      </div>
      <canvas id="export-canvas"></canvas>
    </div>

    <div style="display:flex;flex-direction:column;gap:0.75rem">

      <div class="panel">
        <div class="panel-header">&#9632; &nbsp;Ayarlar</div>
        <div class="panel-body">
          <div class="setting-row">
            <label>Geri sayim</label>
            <select id="csel">
              <option value="1">1 sn</option>
              <option value="2">2 sn</option>
              <option value="3" selected>3 sn</option>
              <option value="5">5 sn</option>
              <option value="10">10 sn</option>
            </select>
          </div>
          <div class="setting-row">
            <label>Fotograf sayisi</label>
            <select id="nsel" onchange="onCountChange()">
              <option value="2">2 fotograf</option>
              <option value="3">3 fotograf</option>
              <option value="4" selected>4 fotograf</option>
            </select>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">&#9632; &nbsp;Grid Formati</div>
        <div class="panel-body">
          <div class="format-grid" id="fgrid"></div>
          <div class="status-bar" id="fstat">2x2 secildi</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">&#9632; &nbsp;Cerceve Stili</div>
        <div class="panel-body" style="padding:0.6rem">
          <div class="frame-grid" id="frame-grid"></div>
          <div class="status-bar" id="frmstat" style="margin-top:0.4rem">Klasik secildi</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">&#9632; &nbsp;Film Seridi</div>
        <div class="panel-body">
          <div class="film-strip" id="filmstrip"></div>
          <div class="status-bar" id="filmstat">0 / 4 fotograf</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const S={
  lastDataUrl:null,
  stream:null,photos:[],maxPhotos:4,shooting:false,curFmt:'2x2',curFrame:'classic',
  fmts:{
    '2x2':{cols:2,rows:2,label:'2x2',min:4,icon:[[1,1],[1,1]]},
    '1x4':{cols:1,rows:4,label:'1x4',min:4,icon:[[1],[1],[1],[1]]},
    '2x1':{cols:2,rows:1,label:'2x1',min:2,icon:[[1,1]]},
    '1x2':{cols:1,rows:2,label:'1x2',min:2,icon:[[1],[1]]},
    '1x3':{cols:1,rows:3,label:'1x3',min:3,icon:[[1],[1],[1]]},
    '3x1':{cols:3,rows:1,label:'3x1',min:3,icon:[[1,1,1]]}
  },
  frames:{
    classic:{
      label:'Klasik',
      previewClass:'fp-classic',
      cellColor:'#c9a84c',
      decos:[],
      render:renderClassic
    },
    white:{
      label:'Minimal',
      previewClass:'fp-white',
      cellColor:'#888',
      decos:[],
      render:renderWhite
    },
    bday:{
      label:'Dogum Gunu',
      previewClass:'fp-bday',
      cellColor:'#c084fc',
      decos:['🎂','🎉','✨','🎈','🎊','⭐'],
      render:renderBday
    },
    love:{
      label:'Ask',
      previewClass:'fp-love',
      cellColor:'#fb7185',
      decos:['❤️','💕','💗','🌹','💋','✨'],
      render:renderLove
    },
    spring:{
      label:'Bahar',
      previewClass:'fp-spring',
      cellColor:'#86efac',
      decos:['🌸','🌺','🍃','🌼','🌻','🌷'],
      render:renderSpring
    },
    galaxy:{
      label:'Galaksi',
      previewClass:'fp-galaxy',
      cellColor:'#818cf8',
      decos:['⭐','🌙','✨','💫','🌟','⚡'],
      render:renderGalaxy
    }
  }
};

const $=id=>document.getElementById(id);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

/* CAMERA */
async function requestCamera(){
  $('cam-err').textContent='';
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){$('cam-err').textContent='Kamera desteklenmiyor.';return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1920},height:{ideal:1080}},audio:false});
    S.stream=stream;const v=$('video');v.srcObject=stream;try{await v.play();}catch(e){}
    $('cam-overlay').style.display='none';$('btn-start').disabled=false;
  }catch(e){
    let msg='Hata: '+e.name;
    if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError')msg='Izin reddedildi. Safari: Ayarlar > Gizlilik > Kamera';
    else if(e.name==='NotFoundError')msg='Kamera bulunamadi.';
    else if(e.name==='NotReadableError')msg='Kamera kullaniliyor.';
    else if(e.name==='OverconstrainedError'){
      try{const s2=await navigator.mediaDevices.getUserMedia({video:true,audio:false});S.stream=s2;$('video').srcObject=s2;try{await $('video').play();}catch(e2){}$('cam-overlay').style.display='none';$('btn-start').disabled=false;return;}
      catch(e2){msg='Hata: '+e2.message;}
    }
    $('cam-err').textContent=msg;
  }
}

/* FORMATS */
function buildFormats(){
  const g=$('fgrid');g.innerHTML='';
  Object.entries(S.fmts).forEach(([key,f])=>{
    if(f.min>S.maxPhotos)return;
    const btn=document.createElement('button');
    btn.className='format-btn'+(key===S.curFmt?' active':'');
    btn.onclick=()=>selectFmt(key,btn);
    const cw=f.cols===1?22:f.cols===2?10:7;
    const ch=f.rows===1?14:f.rows===2?7:5;
    const icon=document.createElement('div');icon.className='format-icon';
    f.icon.forEach(row=>{
      const r=document.createElement('div');r.className='frow';
      row.forEach(()=>{const c=document.createElement('div');c.className='fcell';c.style.width=cw+'px';c.style.height=ch+'px';r.appendChild(c);});
      icon.appendChild(r);
    });
    btn.appendChild(icon);btn.appendChild(document.createTextNode(f.label));g.appendChild(btn);
  });
}
function selectFmt(key,btn){
  S.curFmt=key;document.querySelectorAll('.format-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');$('fstat').textContent=S.fmts[key].label+' secildi';
}
function onCountChange(){
  S.maxPhotos=parseInt($('nsel').value);S.photos=[];
  if(S.fmts[S.curFmt].min>S.maxPhotos){const valid=Object.entries(S.fmts).find(([,f])=>f.min<=S.maxPhotos);if(valid)S.curFmt=valid[0];}
  buildFormats();updateFilm();updateDots();$('export-row').style.display='none';$('btn-start').style.display='';$('btn-reset').style.display='none';
}

/* FRAMES */
function buildFrames(){
  const g=$('frame-grid');g.innerHTML='';
  Object.entries(S.frames).forEach(([key,fr])=>{
    const btn=document.createElement('button');
    btn.className='frame-btn'+(key===S.curFrame?' active':'');
    btn.onclick=()=>selectFrame(key,btn);

    const prev=document.createElement('div');
    prev.className='frame-preview '+fr.previewClass;

    // floating decos
    if(fr.decos.length){
      const positions=[[8,6],[48,4],[24,16],[60,12],[4,22],[40,20]];
      fr.decos.slice(0,4).forEach((d,i)=>{
        const span=document.createElement('span');
        span.className='deco';
        span.textContent=d;
        span.style.left=positions[i][0]+'%';
        span.style.top=positions[i][1]+'px';
        prev.appendChild(span);
      });
    }

    // mini 2x2 grid
    const mg=document.createElement('div');
    mg.className='mini-grid';
    for(let i=0;i<4;i++){
      const cell=document.createElement('div');
      cell.className='mini-cell';
      cell.style.background='rgba(0,0,0,0.45)';
      cell.style.border='1px solid '+fr.cellColor;
      cell.style.borderRadius='2px';
      mg.appendChild(cell);
    }
    prev.appendChild(mg);

    const lbl=document.createElement('div');lbl.className='frame-label';lbl.textContent=fr.label;
    btn.appendChild(prev);btn.appendChild(lbl);g.appendChild(btn);
  });
}
function selectFrame(key,btn){
  S.curFrame=key;document.querySelectorAll('.frame-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');$('frmstat').textContent=S.frames[key].label+' secildi';
}

/* DOTS */
function updateDots(){
  const d=$('dots');d.innerHTML='';
  for(let i=0;i<S.maxPhotos;i++){const dot=document.createElement('div');dot.className='dot'+(i<S.photos.length?' filled':'');d.appendChild(dot);}
}

/* FILM */
function updateFilm(){
  const fs=$('filmstrip');fs.innerHTML='';
  for(let i=0;i<S.maxPhotos;i++){
    if(S.photos[i]){
      const wrap=document.createElement('div');wrap.className='film-thumb';
      const img=document.createElement('img');img.src=S.photos[i];
      const num=document.createElement('div');num.className='film-num';num.textContent=(i+1);
      const del=document.createElement('button');del.className='film-del';del.textContent='x';
      const idx=i;del.onclick=()=>{S.photos.splice(idx,1);updateFilm();updateDots();$('export-row').style.display='none';};
      wrap.appendChild(img);wrap.appendChild(num);wrap.appendChild(del);fs.appendChild(wrap);
    }else{
      const e=document.createElement('div');e.className='empty-slot';
      const s=document.createElement('span');s.textContent=(i+1)+'. kare';e.appendChild(s);fs.appendChild(e);
    }
  }
  $('filmstat').textContent=S.photos.length+' / '+S.maxPhotos+' fotograf';
}

/* SESSION */
async function startSession(){
  if(S.shooting||!S.stream)return;
  S.shooting=true;S.photos=[];
  $('btn-start').style.display='none';$('btn-reset').style.display='';$('export-row').style.display='none';
  updateFilm();updateDots();
  for(let i=0;i<S.maxPhotos;i++){
    if(!S.shooting)break;
    const dots=$('dots').querySelectorAll('.dot');
    if(dots[i])dots[i].classList.add('active');
    $('recbadge').style.display='block';
    await countdown();if(!S.shooting)break;
    snap();
    if(dots[i]){dots[i].classList.remove('active');dots[i].classList.add('filled');}
    updateFilm();updateDots();
    if(i<S.maxPhotos-1)await sleep(900);
  }
  S.shooting=false;$('recbadge').style.display='none';
  if(S.photos.length===S.maxPhotos){
    $('export-row').style.display='flex';
    if(navigator.share){$('btn-share').style.display='';$('btn-save').style.display='';}
  }
}
function resetSession(){
  S.shooting=false;S.photos=[];
  $('btn-start').style.display='';$('btn-reset').style.display='none';
  $('export-row').style.display='none';$('recbadge').style.display='none';
  $('cdn').classList.remove('show');updateFilm();updateDots();
}
async function countdown(){
  const secs=parseInt($('csel').value);const el=$('cdn');
  const showMs=secs<=2?450:750;const hideMs=secs<=2?100:200;
  for(let s=secs;s>=1;s--){if(!S.shooting)return;el.textContent=s;el.classList.add('show');await sleep(showMs);el.classList.remove('show');await sleep(hideMs);}
}
function snap(){
  const video=$('video');
  const TW=1200,TH=900;
  const canvas=document.createElement('canvas');canvas.width=TW;canvas.height=TH;
  const ctx=canvas.getContext('2d');
  const vw=video.videoWidth||1280,vh=video.videoHeight||720;
  const tr=TW/TH,vr=vw/vh;
  let sx,sy,sw,sh;
  if(vr>tr){sh=vh;sw=vh*tr;sx=(vw-sw)/2;sy=0;}
  else{sw=vw;sh=vw/tr;sx=0;sy=(vh-sh)/2;}
  ctx.save();ctx.translate(TW,0);ctx.scale(-1,1);
  ctx.drawImage(video,sx,sy,sw,sh,0,0,TW,TH);ctx.restore();
  S.photos.push(canvas.toDataURL('image/jpeg',0.97));
  const fl=$('flash');fl.style.transition='none';fl.style.opacity='1';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{fl.style.transition='opacity 0.15s ease-out';fl.style.opacity='0';}));
}

/* ═══════════════════════════════
   FRAME RENDER FUNCTIONS
═══════════════════════════════ */

// Shared: draw photos with cover crop into cells
async function drawPhotos(ctx,photos,f,IX,IY,CW,CH,GAP){
  const loadImg=url=>new Promise((res,rej)=>{const img=new Image();img.onload=()=>res(img);img.onerror=rej;img.src=url;});
  for(let i=0;i<photos.length;i++){
    const col=i%f.cols,row=Math.floor(i/f.cols);
    const cx=IX+col*(CW+GAP),cy=IY+row*(CH+GAP);
    ctx.fillStyle='#111';ctx.fillRect(cx,cy,CW,CH);
    try{
      const img=await loadImg(photos[i]);
      ctx.save();ctx.beginPath();ctx.rect(cx,cy,CW,CH);ctx.clip();
      ctx.drawImage(img,cx,cy,CW,CH);ctx.restore();
    }catch(e){}
  }
}

// Draw emoji decorations randomly scattered
function drawEmojis(ctx,emojis,TW,TH,count,size,seed){
  ctx.font=size+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  const positions=[[0.08,0.06],[0.92,0.08],[0.05,0.5],[0.95,0.48],[0.1,0.92],[0.9,0.91],[0.5,0.04],[0.5,0.96],[0.2,0.15],[0.8,0.14],[0.18,0.85],[0.82,0.84]];
  for(let i=0;i<Math.min(count,positions.length);i++){
    const e=emojis[i%emojis.length];
    const x=positions[i][0]*TW,y=positions[i][1]*TH;
    ctx.save();ctx.globalAlpha=0.75;
    ctx.fillText(e,x,y);ctx.restore();
  }
}

async function renderClassic(ctx,photos,f,TW,TH,IX,IY,CW,CH,GAP,BPAD){
  // Cream background
  ctx.fillStyle='#f5f0e8';ctx.fillRect(0,0,TW,TH);
  // Dark outer border
  ctx.fillStyle='#1a1410';ctx.fillRect(BPAD,BPAD,TW-BPAD*2,TH-BPAD*2);
  ctx.fillStyle='#f5f0e8';ctx.fillRect(BPAD+4,BPAD+4,TW-(BPAD+4)*2,TH-(BPAD+4)*2);
  await drawPhotos(ctx,photos,f,IX,IY,CW,CH,GAP);
  // Gold cell borders
  for(let i=0;i<photos.length;i++){
    const col=i%f.cols,row=Math.floor(i/f.cols);
    const cx=IX+col*(CW+GAP),cy=IY+row*(CH+GAP);
    ctx.strokeStyle='#c9a84c';ctx.lineWidth=2;ctx.strokeRect(cx,cy,CW,CH);
  }
  // Stamp
  ctx.fillStyle='#c9a84c';ctx.font='bold 20px monospace';ctx.textAlign='center';
  ctx.fillText('PHOTOBOOTH  *  '+new Date().toLocaleDateString('tr-TR'),TW/2,TH-BPAD-12);
}

async function renderWhite(ctx,photos,f,TW,TH,IX,IY,CW,CH,GAP,BPAD){
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,TW,TH);
  await drawPhotos(ctx,photos,f,IX,IY,CW,CH,GAP);
  for(let i=0;i<photos.length;i++){
    const col=i%f.cols,row=Math.floor(i/f.cols);
    const cx=IX+col*(CW+GAP),cy=IY+row*(CH+GAP);
    ctx.strokeStyle='#e0e0e0';ctx.lineWidth=1;ctx.strokeRect(cx,cy,CW,CH);
  }
  ctx.fillStyle='#aaaaaa';ctx.font='16px monospace';ctx.textAlign='center';
  ctx.fillText('photobooth  |  '+new Date().toLocaleDateString('tr-TR'),TW/2,TH-BPAD-12);
}

async function renderBday(ctx,photos,f,TW,TH,IX,IY,CW,CH,GAP,BPAD){
  // Deep purple bg
  const grad=ctx.createLinearGradient(0,0,TW,TH);
  grad.addColorStop(0,'#1a0a2e');grad.addColorStop(1,'#2d1458');
  ctx.fillStyle=grad;ctx.fillRect(0,0,TW,TH);

  // Confetti dots
  const colors=['#f9a8d4','#c084fc','#fbbf24','#34d399','#60a5fa','#fb7185'];
  for(let i=0;i<80;i++){
    ctx.fillStyle=colors[i%colors.length];
    ctx.globalAlpha=0.5+Math.random()*0.4;
    const x=(Math.sin(i*137.5)*0.5+0.5)*TW;
    const y=(Math.cos(i*97.3)*0.5+0.5)*TH;
    const size=3+Math.random()*6;
    ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Border
  ctx.strokeStyle='#c084fc';ctx.lineWidth=3;ctx.strokeRect(BPAD,BPAD,TW-BPAD*2,TH-BPAD*2);

  await drawPhotos(ctx,photos,f,IX,IY,CW,CH,GAP);
  for(let i=0;i<photos.length;i++){
    const col=i%f.cols,row=Math.floor(i/f.cols);
    const cx=IX+col*(CW+GAP),cy=IY+row*(CH+GAP);
    ctx.strokeStyle='#c084fc';ctx.lineWidth=2;ctx.strokeRect(cx,cy,CW,CH);
  }

  drawEmojis(ctx,['🎂','🎉','✨','🎈','🎊','⭐','🥳','🎁'],TW,TH,12,28,1);

  ctx.fillStyle='#f9a8d4';ctx.font='bold 20px serif';ctx.textAlign='center';
  ctx.fillText('Happy Birthday! 🎂  '+new Date().toLocaleDateString('tr-TR'),TW/2,TH-BPAD-12);
}

async function renderLove(ctx,photos,f,TW,TH,IX,IY,CW,CH,GAP,BPAD){
  const grad=ctx.createLinearGradient(0,0,TW,TH);
  grad.addColorStop(0,'#2d0a14');grad.addColorStop(0.5,'#4a1020');grad.addColorStop(1,'#2d0a14');
  ctx.fillStyle=grad;ctx.fillRect(0,0,TW,TH);

  // Rose petals scattered
  ctx.font='20px serif';ctx.textAlign='center';
  const ppos=[[0.1,0.08],[0.88,0.06],[0.05,0.45],[0.95,0.42],[0.08,0.88],[0.91,0.86],[0.45,0.04],[0.55,0.95],[0.25,0.2],[0.75,0.18],[0.22,0.8],[0.78,0.82]];
  ppos.forEach(([px,py])=>{
    ctx.globalAlpha=0.6+Math.random()*0.3;
    ctx.fillText('❤',px*TW,py*TH);
  });
  ctx.globalAlpha=1;

  // Elegant border with double line
  ctx.strokeStyle='#fb7185';ctx.lineWidth=3;ctx.strokeRect(BPAD,BPAD,TW-BPAD*2,TH-BPAD*2);
  ctx.strokeStyle='rgba(251,113,133,0.3)';ctx.lineWidth=1;ctx.strokeRect(BPAD+8,BPAD+8,TW-(BPAD+8)*2,TH-(BPAD+8)*2);

  await drawPhotos(ctx,photos,f,IX,IY,CW,CH,GAP);
  for(let i=0;i<photos.length;i++){
    const col=i%f.cols,row=Math.floor(i/f.cols);
    const cx=IX+col*(CW+GAP),cy=IY+row*(CH+GAP);
    ctx.strokeStyle='#fb7185';ctx.lineWidth=2;ctx.strokeRect(cx,cy,CW,CH);
  }

  drawEmojis(ctx,['❤️','💕','🌹','💋','💗','✨'],TW,TH,10,26,2);

  ctx.fillStyle='#fb7185';ctx.font='italic bold 22px serif';ctx.textAlign='center';
  ctx.fillText('With Love  ♥  '+new Date().toLocaleDateString('tr-TR'),TW/2,TH-BPAD-12);
}

async function renderSpring(ctx,photos,f,TW,TH,IX,IY,CW,CH,GAP,BPAD){
  const grad=ctx.createLinearGradient(0,0,TW,TH);
  grad.addColorStop(0,'#0a2010');grad.addColorStop(1,'#142808');
  ctx.fillStyle=grad;ctx.fillRect(0,0,TW,TH);

  // Petal pattern border area
  ctx.strokeStyle='#86efac';ctx.lineWidth=2;ctx.strokeRect(BPAD,BPAD,TW-BPAD*2,TH-BPAD*2);
  ctx.strokeStyle='rgba(134,239,172,0.3)';ctx.lineWidth=1;ctx.strokeRect(BPAD+7,BPAD+7,TW-(BPAD+7)*2,TH-(BPAD+7)*2);

  await drawPhotos(ctx,photos,f,IX,IY,CW,CH,GAP);
  for(let i=0;i<photos.length;i++){
    const col=i%f.cols,row=Math.floor(i/f.cols);
    const cx=IX+col*(CW+GAP),cy=IY+row*(CH+GAP);
    ctx.strokeStyle='#86efac';ctx.lineWidth=2;ctx.strokeRect(cx,cy,CW,CH);
  }

  drawEmojis(ctx,['🌸','🌺','🍃','🌼','🌻','🌷','🦋','🌿'],TW,TH,12,26,3);

  ctx.fillStyle='#86efac';ctx.font='bold 20px serif';ctx.textAlign='center';
  ctx.fillText('Spring Vibes 🌸  '+new Date().toLocaleDateString('tr-TR'),TW/2,TH-BPAD-12);
}

async function renderGalaxy(ctx,photos,f,TW,TH,IX,IY,CW,CH,GAP,BPAD){
  const grad=ctx.createRadialGradient(TW/2,TH/2,0,TW/2,TH/2,TW*0.8);
  grad.addColorStop(0,'#0f0c29');grad.addColorStop(0.5,'#060818');grad.addColorStop(1,'#000000');
  ctx.fillStyle=grad;ctx.fillRect(0,0,TW,TH);

  // Stars
  for(let i=0;i<200;i++){
    const x=(Math.sin(i*73.1)*0.5+0.5)*TW;
    const y=(Math.cos(i*47.3)*0.5+0.5)*TH;
    const r=Math.random()*1.5+0.5;
    ctx.fillStyle='white';ctx.globalAlpha=Math.random()*0.8+0.2;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Neon border with glow
  ctx.shadowColor='#818cf8';ctx.shadowBlur=20;
  ctx.strokeStyle='#818cf8';ctx.lineWidth=2;ctx.strokeRect(BPAD,BPAD,TW-BPAD*2,TH-BPAD*2);
  ctx.shadowBlur=0;

  await drawPhotos(ctx,photos,f,IX,IY,CW,CH,GAP);
  for(let i=0;i<photos.length;i++){
    const col=i%f.cols,row=Math.floor(i/f.cols);
    const cx=IX+col*(CW+GAP),cy=IY+row*(CH+GAP);
    ctx.shadowColor='#818cf8';ctx.shadowBlur=8;
    ctx.strokeStyle='#818cf8';ctx.lineWidth=2;ctx.strokeRect(cx,cy,CW,CH);
    ctx.shadowBlur=0;
  }

  drawEmojis(ctx,['⭐','🌙','✨','💫','🌟','⚡','🪐','🔮'],TW,TH,12,26,4);

  ctx.shadowColor='#818cf8';ctx.shadowBlur=10;
  ctx.fillStyle='#c7d2fe';ctx.font='bold 20px monospace';ctx.textAlign='center';
  ctx.fillText('✦ GALAXY  *  '+new Date().toLocaleDateString('tr-TR')+' ✦',TW/2,TH-BPAD-12);
  ctx.shadowBlur=0;
}

/* EXPORT */
async function doExport(mode){
  const f=S.fmts[S.curFmt];
  const fr=S.frames[S.curFrame];
  const photos=S.photos.slice(0,f.cols*f.rows);
  const CW=600,CH=450,PAD=32,GAP=12,BPAD=24,BOTTOM=52;
  const TW=f.cols*CW+(f.cols-1)*GAP+PAD*2+BPAD*2;
  const TH=f.rows*CH+(f.rows-1)*GAP+PAD*2+BPAD*2+BOTTOM;
  const canvas=$('export-canvas');canvas.width=TW;canvas.height=TH;
  const ctx=canvas.getContext('2d');
  const IX=BPAD+PAD,IY=BPAD+PAD;
  await fr.render(ctx,photos,f,TW,TH,IX,IY,CW,CH,GAP,BPAD);
  const dataUrl=canvas.toDataURL('image/jpeg',0.96);
  S.lastDataUrl=dataUrl;
  if(mode==='download'){const a=document.createElement('a');a.download='photobooth-'+Date.now()+'.jpg';a.href=dataUrl;a.click();}
  else{const w=window.open('','_blank');if(w){w.document.write('<html><body style="margin:0;background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh"><img src="'+dataUrl+'" style="max-width:100%;max-height:100vh;display:block"></body></html>');w.document.close();}}
}

function dataUrlToBlob(dataUrl){
  const arr=dataUrl.split(',');const mime=arr[0].match(/:(.*?);/)[1];
  const bstr=atob(arr[1]);let n=bstr.length;const u8=new Uint8Array(n);
  while(n--)u8[n]=bstr.charCodeAt(n);return new Blob([u8],{type:mime});
}
async function doShare(){
  if(!S.lastDataUrl)return;
  const blob=dataUrlToBlob(S.lastDataUrl);
  const file=new File([blob],'photobooth-'+Date.now()+'.jpg',{type:'image/jpeg'});
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file],title:'Photobooth'});}
    catch(e){if(e.name!=='AbortError')alert('Paylasim basarisiz: '+e.message);}
  }else{alert('Tarayici paylasimi desteklemiyor.');}
}
async function doSave(){
  if(!S.lastDataUrl)return;
  const blob=dataUrlToBlob(S.lastDataUrl);
  const file=new File([blob],'photobooth-'+Date.now()+'.jpg',{type:'image/jpeg'});
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
    try{await navigator.share({files:[file],title:'Photobooth'});return;}
    catch(e){if(e.name==='AbortError')return;}
  }
  const a=document.createElement('a');a.download='photobooth-'+Date.now()+'.jpg';a.href=S.lastDataUrl;a.click();
}

buildFormats();buildFrames();updateFilm();updateDots();
